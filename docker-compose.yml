version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: campestre_postgres
    restart: always
    environment:
      POSTGRES_USER: campestre_user
      POSTGRES_PASSWORD: campestre_secure_password
      POSTGRES_DB: campestre_pos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: campestre_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
